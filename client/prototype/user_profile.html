<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- custom CSS-->
    <link rel="stylesheet" href="static/styles/default.css" />
    <link rel="stylesheet" href="static/styles/loader.css" />
    <link rel="stylesheet" href="static/styles/skeleton_loader.css" />

    <!-- font awesome-->
    <script
      src="https://kit.fontawesome.com/e4d4c44ee2.js"
      crossorigin="anonymous"
    ></script>

    <title>COMPANY NAME | PAGENAME</title>
  </head>

  <body>
    <!-- header nav start-->
    <nav-header></nav-header>

    <!-- main container start-->
    <div class="container">
      <img
        src="https://dummyimage.com/728x90/6495ED/fff.png"
        width="728"
        height="90"
        alt="profile banner"
        class="profile-banner mt-5"
      />
      <div class="form-container mt-5 mb-3 d-flex">
        <i class="fa-solid fa-id-badge fa-3x"></i>
        <h1 class="ms-3">
          Welcome,
          <span id="firstname" class="text-capitalize">firstname</span>
          <span id="lastname" class="text-capitalize">lastname</span>
        </h1>
      </div>
      <div class="user-info mb-5">
        <h4>
          Username:
          <span id="username" class="fw-normal">user1234</span>
        </h4>
        <h4>
          Roles:
          <span id="roles" class="fw-normal">USER</span>
        </h4>
        <h4>
          Token expires:
          <span id="tokenExpiresAt" class="fw-normal">not available</span>
        </h4>
        <h4>
          Status: <span id="isEnabled" class="fw-normal">signed in</span>
        </h4>
      </div>
      <button type="button" class="btn btn-danger logout-btn">Logout</button>
    </div>

    <!--footer start -->
    <nav-footer></nav-footer>

    <!-- Optional JavaScript -->
    <script src="static/scripts/components/header.js"></script>
    <script src="static/scripts/components/footer.js"></script>
    <script src="static/scripts/utils/location_service.js"></script>
    <script src="static/scripts/utils/datetime_service.js"></script>
    <script src="static/scripts/utils/httprequest_service.js"></script>
    <script src="static/scripts/demo_pages.js"></script>

    <!-- Bootstrap JS bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
